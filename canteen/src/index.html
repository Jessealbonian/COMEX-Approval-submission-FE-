<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>HotBite</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- PWA Meta Tags -->
  <meta name="description"
    content="A comprehensive canteen management system for Golden College students, staff, and volunteers">
  <meta name="theme-color" content="#52796f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HotBite">
  <meta name="msapplication-TileColor" content="#52796f">
  <meta name="msapplication-tap-highlight" content="no">

  <!-- Icons and Manifest -->
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="manifest" href="manifest.json">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body class="mat-typography">
  <app-root></app-root>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      let hasRefreshed = false;

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (hasRefreshed) {
          return;
        }
        hasRefreshed = true;
        window.location.reload();
      });

      window.addEventListener('load', () => {
        const resolveBuildVersion = () => {
          const mainScript = document.querySelector('script[src*="main"]');
          if (mainScript) {
            try {
              const mainUrl = new URL(mainScript.src, window.location.href);
              const fileName = mainUrl.pathname.split('/').pop();
              if (fileName && fileName.length > 0) {
                return fileName;
              }
            } catch (error) {
              console.warn('Failed to derive build version from main bundle:', error);
            }
          }
          return Date.now().toString();
        };

        const buildVersion = resolveBuildVersion();
        const swUrl = `/sw.js?v=${encodeURIComponent(buildVersion)}`;

        navigator.serviceWorker
          .register(swUrl)
          .then((registration) => {
            console.log('SW registered:', registration);

            if (registration.waiting) {
              registration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }

            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              if (!newWorker) {
                return;
              }

              newWorker.addEventListener('statechange', () => {
                if (
                  newWorker.state === 'installed' &&
                  navigator.serviceWorker.controller
                ) {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          })
          .catch((registrationError) => {
            console.error('SW registration failed:', registrationError);
          });
      });
    }
  </script>
</body>

</html>
