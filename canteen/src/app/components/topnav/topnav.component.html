<nav class="topnav">
    <div class="logo-section" (click)="navigateHome()" style="cursor:pointer">
        <img src="/logo.png" alt="HotBite Logo" class="logo">
        <!-- <span class="app-name">HotBite</span> -->
    </div>

    <div class="right-section">
        <!-- Desktop buttons - visible on larger screens -->
        <div class="desktop-buttons">
            <button class="cart-btn badge-parent" (click)="navigateToCart()" aria-label="Cart">
                <!-- Placeholder for cart icon -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M9 22C9.55228 22 10 21.5523 10 21C10 20.4477 9.55228 20 9 20C8.44772 20 8 20.4477 8 21C8 21.5523 8.44772 22 9 22Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path
                        d="M20 22C20.5523 22 21 21.5523 21 21C21 20.4477 20.5523 20 20 20C19.4477 20 19 20.4477 19 21C19 21.5523 19.4477 22 20 22Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path
                        d="M1 1H5L7.68 14.39C7.77144 14.8504 8.02191 15.264 8.38755 15.5583C8.75318 15.8526 9.2107 16.009 9.68 16H19.4C19.8693 16.009 20.3268 15.8526 20.6925 15.5583C21.0581 15.264 21.3086 14.8504 21.4 14.39L23 6H6"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span *ngIf="cartItemCount > 0" class="badge badge-count"
                    [attr.aria-label]="cartItemCount + ' items in cart'">{{cartItemCount}}</span>
            </button>
            <button class="orders-btn badge-parent" (click)="navigateToOrders()" aria-label="My Orders">
                My Orders
                <span *ngIf="pendingOrdersCount > 0" class="badge badge-dot" aria-hidden="true"></span>
            </button>
            <!-- Availability Toggle for Volunteers -->
            <div *ngIf="isVolunteer" class="availability-toggle-container">
                <span class="availability-label-text">{{ isAvailable ? 'Available' : 'Not Available' }}</span>
                <label class="switch">
                    <input type="checkbox" [checked]="isAvailable" (change)="toggleAvailability()" />
                    <span class="slider"></span>
                </label>
            </div>
            <button *ngIf="isVolunteer && isAvailable" class="volunteer-btn badge-parent"
                (click)="navigateToVolunteerOrders()">Deliver Orders -
                Volunteer
                <span *ngIf="volunteerAssignmentsCount > 0" class="badge badge-count"
                    [attr.aria-label]="volunteerAssignmentsCount + ' orders assigned'">{{volunteerAssignmentsCount}}</span>
            </button>
        </div>

        <div class="user-section" (click)="toggleDropdown()">
            <span class="username">{{ username }}</span>
            <img src="/pfp.png" alt="User Profile" class="profile-pic">
            <svg class="dropdown-arrow" [class.open]="isDropdownOpen" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
            <div class="dropdown-menu" [class.show]="isDropdownOpen">
                <a (click)="navigateToProfile()" class="dropdown-item">Profile</a>
                <!-- Mobile buttons - hidden on larger screens -->
                <div class="mobile-buttons">
                    <a (click)="navigateToCart()" class="dropdown-item badge-parent">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                            style="margin-right: 8px;">
                            <path
                                d="M9 22C9.55228 22 10 21.5523 10 21C10 20.4477 9.55228 20 9 20C8.44772 20 8 20.4477 8 21C8 21.5523 8.44772 22 9 22Z"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            <path
                                d="M20 22C20.5523 22 21 21.5523 21 21C21 20.4477 20.5523 20 20 20C19.4477 20 19 20.4477 19 21C19 21.5523 19.4477 22 20 22Z"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            <path
                                d="M1 1H5L7.68 14.39C7.77144 14.8504 8.02191 15.264 8.38755 15.5583C8.75318 15.8526 9.2107 16.009 9.68 16H19.4C19.8693 16.009 20.3268 15.8526 20.6925 15.5583C21.0581 15.264 21.3086 14.8504 21.4 14.39L23 6H6"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        Cart
                        <span *ngIf="cartItemCount > 0" class="badge badge-count"
                            aria-hidden="true">{{cartItemCount}}</span>
                    </a>
                    <a (click)="navigateToOrders()" class="dropdown-item badge-parent">My Orders
                        <span *ngIf="pendingOrdersCount > 0" class="badge badge-dot" aria-hidden="true"></span>
                    </a>
                    <!-- Availability Toggle for Volunteers (Mobile) -->
                    <div *ngIf="isVolunteer" class="dropdown-item availability-toggle-mobile"
                        (click)="$event.stopPropagation()">
                        <span class="availability-label-text-mobile">Availability:</span>
                        <label class="switch">
                            <input type="checkbox" [checked]="isAvailable" (change)="toggleAvailability()" />
                            <span class="slider"></span>
                        </label>
                        <span class="availability-status-mobile">{{ isAvailable ? 'Available' : 'Not Available'
                            }}</span>
                    </div>
                    <a *ngIf="isVolunteer && isAvailable" (click)="navigateToVolunteerOrders()"
                        class="dropdown-item badge-parent">Deliver Orders -
                        Volunteer
                        <span *ngIf="volunteerAssignmentsCount > 0" class="badge badge-count" aria-hidden="true">
                            {{volunteerAssignmentsCount}}
                        </span>
                    </a>
                </div>
                <a (click)="logout()" class="dropdown-item">Logout</a>
            </div>
        </div>
    </div>
</nav>
