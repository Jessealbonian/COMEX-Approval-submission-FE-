<main class="login-page">
  <section class="login-card">
    <p class="eyebrow">Teacher Login</p>
    <h1>COMEX Approval Submission</h1>
    <p class="subtitle">Sign in as a teacher to manage your submissions.</p>

    <label>
      Email
      <input type="email" placeholder="teacher@example.com" />
    </label>

    <label>
      Password
      <input type="password" placeholder="Enter password" />
    </label>

    <a class="primary-button" routerLink="/teacher/home">Continue to Teacher Portal</a>
    <a class="secondary-link" routerLink="/admin/login">Go to Admin Login</a>
  </section>
</main>
