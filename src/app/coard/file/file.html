<div class="page-shell">
  <header class="page-header">
    <button type="button" class="back" (click)="backToDocuments()">&larr; Back to documents</button>
    <h1>Coordinator Review</h1>
  </header>

  <p class="empty" *ngIf="fileId === null">Pick a document from the documents list to review it.</p>

  <app-file-review *ngIf="fileId !== null" [fileId]="fileId"></app-file-review>
</div>
